version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: superchat-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: superchat
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    networks:
      - superchat-network

  redis:
    image: redis:latest
    container_name: superchat-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - superchat-network
    command: redis-server --appendonly yes

volumes:
  mongodb_data:
  redis_data:

networks:
  superchat-network:
    driver: bridge
