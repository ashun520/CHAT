name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.10.0'
          channel: 'stable'
          cache: true

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          flutter pub get
          
      - name: Create iOS project files
        run: |
          cd frontend
          flutter create --org com.superchat --project-name superchat --platforms=ios .

      - name: Build iOS
        run: |
          cd frontend
          flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          cd frontend
          mkdir -p build/ios/iphoneos
          mkdir -p Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          zip -r SuperChat.ipa Payload
          mv SuperChat.ipa build/ios/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperChat-iOS-IPA
          path: frontend/build/ios/SuperChat.ipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/build/ios/SuperChat.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
