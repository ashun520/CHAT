name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Apple Certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_P12_PASSWORD }}

      - name: Install Provisioning Profile
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "${{ secrets.IOS_MOBILE_PROVISION_BASE64 }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/$(echo "${{ secrets.IOS_MOBILE_PROVISION_BASE64 }}" | base64 --decode | plutil -extract UUID xml1 -o - - | grep -A1 UUID | tail -1 | sed 's/<[^>]*>//g').mobileprovision

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          flutter pub get
          
      - name: Create iOS platform
        run: |
          cd frontend
          flutter create --platforms=ios .
          rm -f ios/Podfile
          rm -f ios/Podfile.lock

      - name: Build iOS
        run: |
          cd frontend
          flutter build ios --release --no-codesign
          
      - name: Codesign iOS App
        run: |
          cd frontend
          # 获取证书信息
          CERT_INFO=$(security find-identity -v -p codesigning | grep "iPhone Distribution" | head -1 | sed 's/.*"/"/' | sed 's/".*//')
          
          # 签名 App
          /usr/bin/codesign --force --sign "$CERT_INFO" --preserve-metadata=identifier,entitlements,flags \
            build/ios/iphoneos/Runner.app
          
          # 签名 Frameworks
          find build/ios/iphoneos/Runner.app/Frameworks -name "*.framework" -exec \
            /usr/bin/codesign --force --sign "$CERT_INFO" {} \;

      - name: Create IPA
        run: |
          cd frontend
          # 创建 Payload 目录
          mkdir -p Payload
          
          # 复制签名后的 App
          cp -R build/ios/iphoneos/Runner.app Payload/
          
          # 复制 Provisioning Profile
          cp ~/Library/MobileDevice/Provisioning\ Profiles/*.mobileprovision Payload/Runner.app/embedded.mobileprovision
          
          # 打包 IPA
          zip -r SuperChat.ipa Payload
          mv SuperChat.ipa build/ios/
          
          # 清理
          rm -rf Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperChat-iOS-IPA
          path: frontend/build/ios/SuperChat.ipa
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/build/ios/SuperChat.ipa
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
