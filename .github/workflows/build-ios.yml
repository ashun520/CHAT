name: Build iOS IPA

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    name: Build iOS IPA
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Dependencies
        run: |
          cd backend
          npm install

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'

      - name: Install Frontend Dependencies
        run: |
          cd frontend
          flutter pub get
          
      - name: Create iOS platform
        run: |
          cd frontend
          flutter create --platforms=ios .
          rm -f ios/Podfile
          rm -f ios/Podfile.lock

      - name: Build iOS
        run: |
          cd frontend
          flutter build ios --release --simulator

      - name: Create IPA
        run: |
          cd frontend
          zip -r SuperChat-Simulator.zip build/ios/iphonesimulator
          mv SuperChat-Simulator.zip build/ios/

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SuperChat-iOS-Simulator
          path: frontend/build/ios/SuperChat-Simulator.zip
          retention-days: 30

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: frontend/build/ios/SuperChat-Simulator.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
